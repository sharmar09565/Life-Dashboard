<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit</title>
    <link rel="stylesheet" href="css/habit.css" />
    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Daily Manager</div>
      <ul>
        <li class="nav-links"><a href="index.html">Dashboard</a></li>
        <li class="nav-links"><a href="habit.html">Habits</a></li>
        <li class="nav-links"><a href="planner.html">Planner</a></li>
        <li class="nav-links"><a href="notes.html">Notes</a></li>
        <li class="nav-links"><a href="progress.html">Progress</a></li>
        <li class="nav-links"><a href="profile.html">Profile</a></li>
      </ul>
    </nav>

    <main class="container">
      <header class="page-header fade-in">
        <h1 class="greeting-msg" id="greeting-msg">Daily Habits</h1>
        <p id="curr-date">Track your routines to build better habits</p>
      </header>
      <form class="add-habits">
        <input
          id="habit-input"
          type="text"
          name="username"
          placeholder="Enter a new habit (e.g.,Read Books)"
        />
        <button class="btn add-btn" id="add-btn" type="submit">Add Habit</button>
      </form>
      <section class="my-habits">
        <div class="habits-card">
          <div class="habits-header">
            <h2>My Habits</h2>
          </div>

          <div class="habits-table">
            <div class="table-head">
              <div class="col habit-col">Habit Name</div>
              <div class="col day-col">S</div>
              <div class="col day-col">M</div>
              <div class="col day-col">T</div>
              <div class="col day-col">W</div>
              <div class="col day-col">T</div>
              <div class="col day-col">F</div>
              <div class="col day-col">S</div>
              <div class="col option-col">Options</div>
            </div>
            <ul id="habits-list">
              <div class="table-row">
                <div class="col habit-col habit-info">
                  <span class="habit-name">Drink water</span>
                </div>
                <div class="col day-col"><input type="checkbox" checked /></div>
                <div class="col day-col"><input type="checkbox" /></div>
                <div class="col day-col"><input type="checkbox" /></div>
                <div class="col day-col"><input type="checkbox" /></div>
                <div class="col day-col"><input type="checkbox" /></div>
                <div class="col day-col"><input type="checkbox" /></div>
                <div class="col day-col"><input type="checkbox" /></div>
                <div class="col option-col">
                  <button class="dots-btn">•••</button>
                </div>
              </div>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <script src="js/global.js"></script>
    <script src="js/habit.js"></script>
  </body>
</html>
